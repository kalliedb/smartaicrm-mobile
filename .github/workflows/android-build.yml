name: Android Build

# Build a signed release AAB (for Play) + APK (for sideload) using Gradle and
# a release keystore — same tooling as Aivera Golf / Aivera Echo. Triggered
# by v* tags or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    name: Build signed release
    runs-on: ubuntu-latest
    timeout-minutes: 90   # cold New-Arch C++ compile is slow; cache makes reruns fast

    env:
      EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so versionCode = git commit count is correct

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Manual Gradle cache: setup-java's `cache: gradle` can't be used because
      # android/ doesn't exist until `expo prebuild` runs later. Key off
      # package-lock.json — it changes when RN/Expo native deps change.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed AAB + APK
        working-directory: android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # Only ARM ABIs — covers every real Android phone. x86/x86_64 are
          # emulator-only and roughly doubled the native compile time.
          ./gradlew :app:bundleRelease :app:assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload AAB (Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: aivera-field-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload APK (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: aivera-field-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
